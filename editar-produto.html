<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Editar Produto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 600px;">
        <div class="card">
            <h2>Editar Produto</h2>
            <div class="form-group">
                <label>Nome *</label>
                <input type="text" value="Borracha Branca">
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <textarea rows="3">Borracha macia escolar</textarea>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                <div class="form-group">
                    <label>Preço (R$) *</label>
                    <input type="text" value="1.50">
                </div>
                <div class="form-group">
                    <label>Quantidade *</label>
                    <input type="number" value="200">
                </div>
            </div>
            <div class="btn-row">
                <a href="produtos.html" class="btn btn-cancel">Cancelar</a>
                <a href="produtos.html" class="btn btn-save">Salvar</a>
            </div>
        </div>
    </div>
</body>
</html>
