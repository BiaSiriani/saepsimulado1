<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>
    <script>if(localStorage.getItem('auth')!=='true') window.location.href='index.html';</script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #222; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th { background: #333; color: white; padding: 12px; text-align: left; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; }
        .btn { padding: 6px 12px; border: none; border-radius: 3px; cursor: pointer; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        .btn-edit { background: #ffc107; color: black; margin-right: 5px; }
        .btn-del { background: #dc3545; color: white; }
        .btn-add { background: #333; color: white; }
        .btn-voltar { background: #6c757d; color: white; margin-left: 5px; }
        .controles { display: flex; justify-content: space-between; margin-bottom: 15px; }
        /* Destaque para quando não encontrar nada */
        .no-results { text-align: center; padding: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>
   <header style="background: #222; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 10px;">
        <div style="background: #28a745; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px;">
            📦
        </div>
        <strong style="font-size: 1.2rem;">StockFlow — Gestão de Estoque</strong>
    </div>
    <div>
        <span style="margin-right: 15px;">Olá, Administrador</span>
        <button onclick="localStorage.removeItem('auth'); window.location.href='index.html'" style="background:#dc3545; color:white; border:none; padding:5px 15px; cursor:pointer; border-radius:4px; font-weight:bold;">Sair</button>
    </div>
</header>

    <div class="container">
        <h2>Cadastro de Produtos</h2>
        <p style="color:#666; margin-bottom:20px;">Gerencie o catálogo de produtos do sistema</p>

        <div class="controles">
            <input type="text" id="inputBusca" oninput="filtrarProdutos()" placeholder="Buscar produto por nome..." style="padding:8px; width:250px; border:1px solid #ccc; border-radius:4px;">
            
            <div>
                <a href="editar-produto.html" class="btn btn-add">+ Novo Produto</a>
                <button class="btn btn-voltar" onclick="location.href='dashboard.html'">Voltar</button>
            </div>
        </div>

        <table>
            <thead>
                <tr><th>ID</th><th>Nome</th><th>Descrição</th><th>Preço</th><th>Estoque</th><th>Estoque Min.</th><th>Ações</th></tr>
            </thead>
            <tbody id="tabela-corpo"></tbody>
        </table>
    </div>

    <script>
        // Função para carregar e renderizar a tabela
        function renderizarTabela(filtro = "") {
            let produtos = JSON.parse(localStorage.getItem('meus_produtos') || '[]');
            
            // Ordenar por ID
            produtos.sort((a, b) => a.id - b.id);

            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = "";

            // Filtrar os produtos pelo nome (ignorando maiúsculas/minúsculas)
            const produtosFiltrados = produtos.filter(p => 
                p.nome.toLowerCase().includes(filtro.toLowerCase())
            );

            if (produtosFiltrados.length === 0) {
                corpo.innerHTML = `<tr><td colspan="7" class="no-results">Nenhum produto encontrado com "${filtro}"</td></tr>`;
                return;
            }

            produtosFiltrados.forEach(p => {
                corpo.innerHTML += `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.nome}</td>
                        <td>${p.desc}</td>
                        <td>R$ ${p.preco}</td>
                        <td>${p.estoque}</td>
                        <td>${p.min || 5}</td>
                        <td>
                            <a href="editar-produto.html?id=${p.id}" class="btn btn-edit">Editar</a>
                            <button onclick="excluir(${p.id}, '${p.nome}')" class="btn btn-del">Excluir</button>
                        </td>
                    </tr>`;
            });
        }

        // Função chamada sempre que o usuário digita na barra de busca
        function filtrarProdutos() {
            const termo = document.getElementById('inputBusca').value;
            renderizarTabela(termo);
        }

        function excluir(id, nome) {
            if(confirm(`Deseja excluir o produto "${nome}"?`)) {
                let produtos = JSON.parse(localStorage.getItem('meus_produtos'));
                produtos = produtos.filter(p => p.id !== id);
                localStorage.setItem('meus_produtos', JSON.stringify(produtos));
                filtrarProdutos(); // Recarrega mantendo o filtro atual
            }
        }

        // Inicializa com a lista completa
        renderizarTabela();
    </script>
</body>
</html>
