<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div><strong>- Gestão de Estoque</strong></div>
        <div>Olá, Administrador <button class="btn-sair">Sair</button></div>
    </header>
    <div class="container">
        <h2>Cadastro de Produtos</h2>
        <p class="subtitle">Gerencie o catálogo de produtos do sistema</p>
        
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <input type="text" placeholder="Buscar produto por nome..." style="width:300px">
            <div>
                <a href="editar-produto.html" class="btn btn-add">+ Novo Produto</a>
                <a href="dashboard.html" class="btn btn-cancel">Voltar</a>
            </div>
        </div>

        <table>
            <thead>
                <tr><th>ID</th><th>Nome</th><th>Descrição</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr>
            </thead>
            <tbody>
                <tr>
                    <td>3</td><td>Borracha Branca</td><td>Borracha macia escolar</td><td>1.50</td><td>200</td>
                    <td>
                        <a href="editar-produto.html" class="btn btn-edit">Editar</a>
                        <button class="btn btn-del" onclick="confirm('Deseja excluir?')">Excluir</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
